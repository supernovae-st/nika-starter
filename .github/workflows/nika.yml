# Every push re-proves the workflows in this repo: nika check, statically,
# zero secrets, no untrusted input touches a shell (no run: steps at all).
# Broken DAG = red build, before any token is ever spent.
name: workflows proven
on:
  push:
    branches: [main]
  pull_request:
permissions: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: supernovae-st/nika-action@v1  # first-party · tracks the action's release tag by design
        with:
          workflow: daily-brief.nika.yaml
          mode: check
          comment: 'false'
